# replicas -- Number of replicas for the controller
replicas: 1

image:
  # image.manager -- lxcfs-on-kubernetes controller image
  manager: ghcr.io/cndoit18/lxcfs-manager:latest
  # image.agent -- lxcfs-on-kubernetes agent image
  agent: ghcr.io/cndoit18/lxcfs-agent:latest

# <https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.18/#servicespec-v1-core>
service:
  # service.type -- Service type to use
  type: ClusterIP
  # service.port -- Expose port for WebHook controller
  port: 443

# logLevel -- Set the verbosity of controller. Range of 0 - 6 with 6 being the most verbose.
# Info level is 4.
logLevel: 4

leaderElection:
  # leaderElection.enable -- Whether to enabled leaderElection
  enable: false
  # leaderElection.namespace -- The namespace used to store the ConfigMap for leader election
  namespace: kube-system
  # leaderElection.id -- The id used to store the ConfigMap for leader election
  id: lxcfs-on-kubernetes-leader-election

# imagePullSecrets -- Reference to one or more secrets to be used when pulling images
# <https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/>
# For example:
# `[
#   {"name":"image-pull-secret"}
# ]`
imagePullSecrets: []

# pullPolicy -- The image pull policy.
pullPolicy: IfNotPresent

# resources -- Expects input structure as per specification <https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.18/#resourcerequirements-v1-core>
resources:
  limits:
    cpu: 500m
    memory: 300Mi
  requests:
    cpu: 300m
    memory: 200Mi

# nodeSelector -- Node selector for the controller Deployment
# <https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector>
nodeSelector: {}

# affinity -- Affinity for the controller Pods (podAntiAffinity, nodeAffinity, etc.).
# May be set together with nodeSelector: the scheduler requires all of them to match (AND).
affinity: {}
#affinity:
#  nodeAffinity:
#    requiredDuringSchedulingIgnoredDuringExecution:
#      nodeSelectorTerms:
#        - matchExpressions:
#            - key: node-role.kubernetes.io/control-plane
#              operator: Exists
#  podAntiAffinity:
#    preferredDuringSchedulingIgnoredDuringExecution:
#      - podAffinityTerm:
#          labelSelector:
#            matchLabels:
#              app.kubernetes.io/instance: your-release-name
#              app.kubernetes.io/compose: manager
#          topologyKey: kubernetes.io/hostname
#        weight: 100

# tolerations -- Tolerations for the controller Deployment
# <https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/>
tolerations: []

# podSecurityContext -- Pod-level security context for the controller
# <https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.28/#podsecuritycontext-v1-core>
podSecurityContext: {}

# revisionHistoryLimit -- Number of old ReplicaSets to retain in the controller Deployment
# <https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#revision-history-limit>
revisionHistoryLimit: 10

# podAnnotations -- Additional annotations to add to the controller Pods
podAnnotations: {}

lxcfs:
  # lxcfs.configMaps -- ConfigMaps to be created for lxcfs
  configMaps:
    crictlConfig:
      # crictlConfig.endpoint -- The endpoint of the CRI runtime
      endpoint: /run/containerd/containerd.sock
  # lxcfs.useDaemonset -- Installing lxcfs with daemonset
  useDaemonset: true
  # lxcfs.mountPath -- Specify the mount path of lxcfs on the host
  mountPath: /var/lib/lxcfs-on-k8s/lxcfs
  # lxcfs.resources -- Expects input structure as per specification <https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.18/#resourcerequirements-v1-core>
  resources:
    limits:
      cpu: 500m
      memory: 300Mi
    requests:
      cpu: 300m
      memory: 200M
  # lxcfs.nodeSelector -- Node selector for the lxcfs DaemonSet (run only on matching nodes)
  # <https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector>
  nodeSelector: {}

  # lxcfs.tolerations -- Tolerations for the lxcfs DaemonSet (e.g. to run on tainted nodes)
  # <https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/>
  # Example for a dedicated node pool:
  # tolerations:
  #   - key: dedicated
  #     operator: Equal
  #     value: lxcfs
  #     effect: NoSchedule
  tolerations: []

  # lxcfs.updateStrategy -- Update strategy for the DaemonSet
  # <https://kubernetes.io/docs/concepts/workloads/controllers/daemonset/#update-strategy>
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  # lxcfs.podSecurityContext -- Pod-level security context for the lxcfs DaemonSet
  podSecurityContext: {}

  # lxcfs.matchLabels -- For namespaces that match the labes, the Pods under it will mount lxcfs.
  matchLabels: 
    mount-lxcfs: enabled
  # lxcfs.podAnnotations -- Additional annotations to add to the agent Pods
  podAnnotations: {}

  # lxcfs.args -- Adjusting the boot parameters of lxcfs
  args:
  - -l
  - --enable-cfs
  - --enable-pidfd